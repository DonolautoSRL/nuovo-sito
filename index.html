<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Donolauto — Concessionaria auto usate multi-brand a Legnaro (PD). Stock sempre aggiornato."/>
  <title>Donolauto — Auto Usate Legnaro (PD)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:#F5F4F0;font-family:'DM Sans',sans-serif;}
    select,button{font-family:'DM Sans',sans-serif;}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:#F5F4F0;}
    ::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
    #cookie-banner{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1a1a1a;color:#e5e5e5;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-top:3px solid #CC1F1F;}
    #cookie-banner.hidden{display:none;}
    #cookie-banner p{font-size:13px;line-height:1.6;flex:1;min-width:220px;}
    #cookie-banner a{color:#e87070;text-decoration:underline;cursor:pointer;}
    .c-btns{display:flex;gap:8px;flex-shrink:0;}
    .c-acc{background:#CC1F1F;color:white;border:none;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
    .c-dec{background:transparent;color:#aaa;border:1.5px solid #444;padding:8px 18px;border-radius:7px;font-size:13px;cursor:pointer;}
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;}
    .mb{background:#fff;border-radius:16px;max-width:780px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
    .mc{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.45);color:white;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
    .lc{padding:30px 34px 34px;}
    .lc h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px;}
    .lc h2{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;margin:22px 0 6px;}
    .lc p,.lc li{font-size:14px;line-height:1.8;color:#555;margin-bottom:6px;}
    .lc ul{padding-left:18px;}
    .lc .meta{font-size:11px;color:#999;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid #eee;}
    .card{transition:transform .2s ease,box-shadow .2s ease;cursor:pointer;}
    .card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.09);}
    .dcard{transition:transform .2s ease;cursor:pointer;}
    .dcard:hover{transform:translateY(-4px);}
  </style>
</head>
<body>
<div id="root"></div>

<div id="cookie-banner">
  <p>Questo sito usa solo cookie tecnici necessari al funzionamento. Nessun tracciamento.
     <a onclick="showLegal('cookie')">Cookie Policy</a> ·
     <a onclick="showLegal('privacy')">Privacy Policy</a></p>
  <div class="c-btns">
    <button class="c-dec" onclick="setCookie(false)">Rifiuta</button>
    <button class="c-acc" onclick="setCookie(true)">Accetta e chiudi</button>
  </div>
</div>

<script>
  const { createClient } = window.supabase;
  const db = createClient(
    'https://lropvrandavyegoclpyh.supabase.co',
    'sb_publishable_TUbIHm4OPAt9mkN4zeVIuA_GllRYFsn'
  );
  function setCookie(a){localStorage.setItem('dnl_cc',a?'1':'0');localStorage.setItem('dnl_cd',Date.now());document.getElementById('cookie-banner').classList.add('hidden');}
  function showLegal(t){window._showLegal&&window._showLegal(t);}
  (function(){const c=localStorage.getItem('dnl_cc'),d=localStorage.getItem('dnl_cd');if(c&&d&&Date.now()-d<365*864e5)document.getElementById('cookie-banner').classList.add('hidden');})();
</script>

<script type="text/babel">
  const { useState, useEffect } = React;
  const C = {bg:'#F5F4F0',white:'#FFFFFF',ink:'#1A1A1A',muted:'#888',accent:'#CC1F1F',border:'#E2E0DA',dark:'#111111'};
  const A = {nome:'Donolauto S.r.l.',indirizzo:'Via Romea 121, 35020 Legnaro (PD)',piva:'IT 05258940286',pec:'donolautosrl@pec.it',email:'info@donolauto.it',tel1:'+39 351 8707610',tel2:'+39 049 641284',orari:'Lun–Ven 9:00–12:30 · 14:30–19:00 · Sab 9:00–12:30'};
  const fmt = p => '€ ' + parseInt(p||0).toLocaleString('it-IT');
  const fmtKm = k => parseInt(k||0).toLocaleString('it-IT') + ' km';

  const PRIVACY = {title:'Privacy Policy',updated:'18 aprile 2025',sections:[
    {h:'1. Titolare',p:`${A.nome} · ${A.indirizzo} · P.IVA: ${A.piva} · PEC: ${A.pec}`},
    {h:'2. Dati raccolti',p:'Solo dati forniti volontariamente via modulo contatto. Nessun tracciamento, nessun cookie di profilazione.'},
    {h:'3. Finalità',p:'Rispondere alle richieste degli utenti. Nessuna cessione a terzi.'},
    {h:'4. Base giuridica',p:'Art. 6, par. 1, lett. b e a GDPR.'},
    {h:'5. Conservazione',p:'Max 12 mesi dalla ricezione della richiesta.'},
    {h:'6. Diritti',p:`Accesso, rettifica, cancellazione: ${A.email}`},
    {h:'7. Reclamo',p:'Garante Privacy: www.garanteprivacy.it'},
  ]};
  const COOKIE_P = {title:'Cookie Policy',updated:'18 aprile 2025',sections:[
    {h:'Cookie tecnici usati',list:['dnl_cc — scelta consenso cookie (12 mesi)','dnl_cd — data del consenso (12 mesi)']},
    {h:'Cookie di terze parti',p:'Nessun cookie di profilazione, tracciamento o analytics.'},
    {h:'Google Fonts',p:'Font caricati da Google Fonts. Possibile trasmissione IP a Google. Vedi: policies.google.com/privacy'},
  ]};

  function LegalModal({type,onClose}){
    const doc=type==='privacy'?PRIVACY:COOKIE_P;
    return(
      <div className="ov" onClick={onClose}>
        <div className="mb" onClick={e=>e.stopPropagation()}>
          <button className="mc" onClick={onClose}>✕</button>
          <div className="lc">
            <h1>{doc.title}</h1>
            <div className="meta">{A.nome} · Aggiornata il {doc.updated}</div>
            {doc.sections.map((s,i)=>(
              <div key={i}>
                {s.h&&<h2>{s.h}</h2>}
                {s.p&&<p>{s.p}</p>}
                {s.list&&<ul>{s.list.map((l,j)=><li key={j}>{l}</li>)}</ul>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  function Site(){
    const[page,setPage]=useState('stock');
    const[filters,setFilters]=useState({brand:'',model:'',fuel:'',priceMax:''});
    const[car,setCar]=useState(null);
    const[legal,setLegal]=useState(null);
    const[cars,setCars]=useState([]);
    const[loading,setLoading]=useState(true);

    useEffect(()=>{
      window._showLegal=t=>setLegal(t);
      db.from('cars').select('*').eq('status','published').order('created_at',{ascending:false})
        .then(({data})=>{setCars(data||[]);setLoading(false);});
      // Realtime updates
      const channel=db.channel('cars-changes').on('postgres_changes',{event:'*',schema:'public',table:'cars'},()=>{
        db.from('cars').select('*').eq('status','published').order('created_at',{ascending:false}).then(({data})=>setCars(data||[]));
      }).subscribe();
      return()=>db.removeChannel(channel);
    },[]);

    const brands=[...new Set(cars.map(c=>c.brand))].sort();
    const fuels=[...new Set(cars.map(c=>c.fuel))].sort();
    const models=filters.brand?[...new Set(cars.filter(c=>c.brand===filters.brand).map(c=>c.model))]:[];
    const filtered=cars.filter(c=>{
      if(filters.brand&&c.brand!==filters.brand)return false;
      if(filters.model&&c.model!==filters.model)return false;
      if(filters.fuel&&c.fuel!==filters.fuel)return false;
      if(filters.priceMax&&c.price>parseInt(filters.priceMax))return false;
      return true;
    });

    const NAV=[['stock','Stock Auto'],['special','Special Cars'],['storia','Chi Siamo'],['contatti','Contatti']];

    return(
      <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,minHeight:'100vh',color:C.ink}}>

        <header style={{background:C.white,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 36px',height:62}}>
          <div onClick={()=>setPage('stock')} style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,letterSpacing:'.04em',cursor:'pointer',userSelect:'none'}}>
            DONO<span style={{color:C.accent}}>LAUTO</span>
            <span style={{fontSize:11,fontWeight:400,color:C.muted,marginLeft:10,letterSpacing:'.06em'}}>LEGNARO · PD</span>
          </div>
          <nav style={{display:'flex',gap:28}}>
            {NAV.map(([id,label])=>(
              <button key={id} onClick={()=>setPage(id)} style={{fontSize:11,fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',background:'none',border:'none',color:page===id?C.ink:C.muted,borderBottom:page===id?`2px solid ${C.accent}`:'2px solid transparent',paddingBottom:3,cursor:'pointer'}}>
                {label}
              </button>
            ))}
          </nav>
        </header>

        {/* STOCK */}
        {page==='stock'&&<>
          <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:'26px 36px'}}>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:400,margin:'0 0 18px'}}>Trova la tua prossima auto</h1>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
              <Sel value={filters.brand} onChange={v=>setFilters({...filters,brand:v,model:''})} label="Marca">{brands.map(b=><option key={b}>{b}</option>)}</Sel>
              <Sel value={filters.model} onChange={v=>setFilters({...filters,model:v})} label="Modello" disabled={!filters.brand}>{models.map(m=><option key={m}>{m}</option>)}</Sel>
              <Sel value={filters.fuel} onChange={v=>setFilters({...filters,fuel:v})} label="Alimentazione">{fuels.map(f=><option key={f}>{f}</option>)}</Sel>
              <Sel value={filters.priceMax} onChange={v=>setFilters({...filters,priceMax:v})} label="Prezzo max">
                {[['15000','fino a € 15.000'],['20000','fino a € 20.000'],['25000','fino a € 25.000'],['30000','fino a € 30.000'],['40000','fino a € 40.000'],['60000','fino a € 60.000'],['100000','fino a € 100.000']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </Sel>
              <button onClick={()=>setFilters({brand:'',model:'',fuel:'',priceMax:''})} style={{padding:'10px 16px',background:'transparent',color:C.muted,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,cursor:'pointer',whiteSpace:'nowrap'}}>✕ Reset</button>
            </div>
          </div>
          <div style={{padding:'26px 36px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:400,margin:0}}>Stock disponibile</h2>
              {!loading&&<span style={{fontSize:12,color:C.muted,fontWeight:500}}>{filtered.length} auto trovate</span>}
            </div>
            {loading
              ?<div style={{textAlign:'center',padding:'70px 0',color:C.muted}}>
                  <div style={{fontSize:28,marginBottom:10}}>🚗</div>
                  Caricamento stock...
                </div>
              :filtered.length===0
                ?<div style={{textAlign:'center',padding:'70px 0',color:C.muted,fontSize:15}}>
                    {cars.length===0
                      ?<><div style={{fontSize:40,marginBottom:12}}>🚗</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:8,color:C.ink}}>Stock in aggiornamento</div><div>Contattaci per conoscere le vetture disponibili.</div></>
                      :'Nessun veicolo corrisponde ai filtri.'}
                  </div>
                :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:16}}>
                    {filtered.map(c=><CarCard key={c.id} car={c} onClick={()=>setCar(c)}/>)}
                  </div>
            }
          </div>
        </>}

        {/* SPECIAL */}
        {page==='special'&&(
          <div style={{background:C.dark,minHeight:'calc(100vh - 62px)',padding:'50px 36px'}}>
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#444',marginBottom:8}}>SELEZIONE ESCLUSIVA</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:400,color:'white',margin:'0 0 36px'}}>Special Cars</h2>
              {loading
                ?<div style={{color:'#444',textAlign:'center',padding:'60px 0'}}>Caricamento...</div>
                :cars.filter(c=>c.special).length===0
                  ?<div style={{color:'#444',fontSize:15,textAlign:'center',padding:'60px 0'}}>Nessuna Special Car al momento.</div>
                  :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
                      {cars.filter(c=>c.special).map(c=><DarkCard key={c.id} car={c} onClick={()=>setCar(c)}/>)}
                    </div>
              }
            </div>
          </div>
        )}

        {/* CHI SIAMO */}
        {page==='storia'&&(
          <div style={{padding:'70px 36px'}}>
            <div style={{maxWidth:660,margin:'0 auto',textAlign:'center'}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:96,fontWeight:700,color:C.accent,opacity:.1,lineHeight:1,userSelect:'none'}}>1975</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:400,margin:'-18px 0 22px'}}>Oltre 50 anni di passione per l'auto</h2>
              {['Donolauto nasce a Legnaro nel cuore della provincia di Padova. Da oltre mezzo secolo la famiglia affianca i clienti nella scelta dell\'auto giusta: un consulente di fiducia, non un semplice venditore.',
                'Ogni auto nel nostro stock passa dalla nostra officina interna: viene preparata, revisionata e certificata prima di essere proposta. Nessuna sorpresa, solo trasparenza.',
                'Con oltre 120 vetture vendute ogni anno e una rete di clienti fidelizzati nell\'area Padova–Venezia, Donolauto è sinonimo di qualità e serietà nel mercato dell\'usato multi-brand.'
              ].map((t,i)=><p key={i} style={{fontSize:15,lineHeight:1.85,color:'#666',margin:'0 0 16px'}}>{t}</p>)}
              <div style={{display:'flex',justifyContent:'center',gap:48,marginTop:48}}>
                {[['50+','Anni di attività'],['120+','Auto / anno'],['1','Officina interna']].map(([n,l])=>(
                  <div key={l}><div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,color:C.accent}}>{n}</div><div style={{fontSize:11,color:C.muted,marginTop:4}}>{l}</div></div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* CONTATTI */}
        {page==='contatti'&&(
          <div style={{padding:'56px 36px',maxWidth:540,margin:'0 auto'}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:400,margin:'0 0 6px'}}>Contattaci</h2>
            <p style={{color:C.muted,fontSize:14,margin:'0 0 28px'}}>Siamo a Legnaro (PD). Vieni a trovarci o scrivici.</p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[['📍','Indirizzo',A.indirizzo,null],['📞','Cellulare',A.tel1,`tel:${A.tel1.replace(/\s/g,'')}`],['📞','Fisso',A.tel2,`tel:${A.tel2.replace(/\s/g,'')}`],['✉️','Email',A.email,`mailto:${A.email}`],['📧','PEC',A.pec,null],['🕐','Orari',A.orari,null]].map(([icon,label,value,href])=>(
                <a key={label} href={href||undefined} style={{textDecoration:'none',display:'flex',gap:14,padding:'13px 16px',background:C.white,borderRadius:10,border:`1px solid ${C.border}`,alignItems:'center',color:'inherit'}}>
                  <span style={{fontSize:20}}>{icon}</span>
                  <div><div style={{fontSize:10,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:C.muted,marginBottom:2}}>{label}</div><div style={{fontSize:14,fontWeight:500}}>{value}</div></div>
                </a>
              ))}
            </div>
            <a href={`tel:${A.tel1.replace(/\s/g,'')}`} style={{display:'block',textDecoration:'none'}}>
              <button style={{marginTop:20,width:'100%',padding:14,background:C.accent,color:'white',border:'none',borderRadius:8,fontSize:13,fontWeight:600,letterSpacing:'.07em',textTransform:'uppercase',cursor:'pointer'}}>📞 Chiama ora</button>
            </a>
          </div>
        )}

        <footer style={{background:'#1a1a1a',color:'#555',padding:'22px 36px',marginTop:40,display:'flex',flexWrap:'wrap',gap:14,justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:11,lineHeight:1.8}}>
            © {new Date().getFullYear()} {A.nome} · {A.indirizzo} · P.IVA: {A.piva}<br/>
            Tel: {A.tel1} / {A.tel2} · PEC: {A.pec}
          </div>
          <div style={{display:'flex',gap:18,fontSize:12}}>
            <button onClick={()=>setLegal('privacy')} style={{background:'none',border:'none',color:'#555',cursor:'pointer',textDecoration:'underline',fontSize:12}}>Privacy Policy</button>
            <button onClick={()=>setLegal('cookie')} style={{background:'none',border:'none',color:'#555',cursor:'pointer',textDecoration:'underline',fontSize:12}}>Cookie Policy</button>
          </div>
        </footer>

        {car&&<CarModal car={car} onClose={()=>setCar(null)}/>}
        {legal&&<LegalModal type={legal} onClose={()=>setLegal(null)}/>}
      </div>
    );
  }

  function Sel({value,onChange,label,disabled,children}){
    return(
      <div style={{position:'relative',flex:1,minWidth:145}}>
        <select value={value} disabled={disabled} onChange={e=>onChange(e.target.value)} style={{width:'100%',padding:'10px 32px 10px 13px',border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:value?C.ink:C.muted,background:C.white,cursor:disabled?'not-allowed':'pointer',outline:'none',appearance:'none',WebkitAppearance:'none',opacity:disabled?.5:1,fontFamily:"'DM Sans',sans-serif"}}>
          <option value="">{label}</option>{children}
        </select>
        <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',fontSize:10,color:C.muted}}>▾</span>
      </div>
    );
  }

  function CarCard({car,onClick}){
    return(
      <div onClick={onClick} className="card" style={{background:C.white,borderRadius:12,overflow:'hidden',border:`1px solid ${C.border}`,boxShadow:'0 2px 6px rgba(0,0,0,.04)'}}>
        <div style={{width:'100%',aspectRatio:'16/10',background:car.gradient||'linear-gradient(135deg,#ccc,#eee)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
          {car.images&&car.images[0]?<img src={car.images[0]} alt={car.model} style={{width:'100%',height:'100%',objectFit:'cover',position:'absolute',inset:0}}/>:<span style={{fontSize:46,opacity:.18}}>🚗</span>}
          {car.special&&<div style={{position:'absolute',top:8,right:8,background:C.accent,color:'white',fontSize:9,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',padding:'3px 7px',borderRadius:4}}>★ SPECIAL</div>}
        </div>
        <div style={{padding:'13px 15px'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:C.muted,marginBottom:3}}>{car.brand}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,marginBottom:6}}>{car.model}</div>
          <div style={{display:'flex',gap:8,fontSize:11,color:C.muted,marginBottom:8}}><span>{car.year}</span><span>·</span><span>{fmtKm(car.km)}</span><span>·</span><span>{car.fuel}</span></div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:car.sold?14:20,fontWeight:700,color:car.sold?"#818cf8":C.accent,background:car.sold?"rgba(129,140,248,.12)":undefined,padding:car.sold?"4px 10px":undefined,borderRadius:car.sold?6:undefined}}>{car.sold?"🔴 VENDUTA":fmt(car.price)}</div>
        </div>
      </div>
    );
  }

  function DarkCard({car,onClick}){
    return(
      <div onClick={onClick} className="dcard" style={{borderRadius:12,overflow:'hidden',border:'1px solid #2a2a2a'}}>
        <div style={{width:'100%',aspectRatio:'16/10',background:car.gradient||'linear-gradient(135deg,#333,#555)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
          {car.images&&car.images[0]?<img src={car.images[0]} alt={car.model} style={{width:'100%',height:'100%',objectFit:'cover',position:'absolute',inset:0}}/>:<span style={{fontSize:46,opacity:.22}}>🚗</span>}
        </div>
        <div style={{padding:'13px 15px',background:'#1a1a1a'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'#444',marginBottom:3}}>{car.brand}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,color:'white',marginBottom:6}}>{car.model}</div>
          <div style={{display:'flex',gap:8,fontSize:11,color:'#555',marginBottom:8}}><span>{car.year}</span><span>·</span><span>{fmtKm(car.km)}</span></div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:car.sold?14:20,fontWeight:700,color:car.sold?"#818cf8":C.accent,background:car.sold?"rgba(129,140,248,.12)":undefined,padding:car.sold?"4px 10px":undefined,borderRadius:car.sold?6:undefined}}>{car.sold?"🔴 VENDUTA":fmt(car.price)}</div>
        </div>
      </div>
    );
  }

  function CarModal({car,onClose}){
    const[idx,setIdx]=useState(0);
    const imgs=car.images&&car.images.length>0?car.images:null;
    return(
      <div className="ov" onClick={onClose} style={{zIndex:300}}>
        <div className="mb" onClick={e=>e.stopPropagation()}>
          <button className="mc" onClick={onClose}>✕</button>
          <div style={{width:'100%',aspectRatio:'16/9',background:car.gradient||'linear-gradient(135deg,#ccc,#eee)',borderRadius:'16px 16px 0 0',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
            {imgs?<img src={imgs[idx]} alt={car.model} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:80,opacity:.18}}>🚗</span>}
            {imgs&&imgs.length>1&&<>
              <button onClick={e=>{e.stopPropagation();setIdx((idx-1+imgs.length)%imgs.length);}} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.5)',color:'white',border:'none',borderRadius:'50%',width:34,height:34,cursor:'pointer',fontSize:18}}>‹</button>
              <button onClick={e=>{e.stopPropagation();setIdx((idx+1)%imgs.length);}} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,.5)',color:'white',border:'none',borderRadius:'50%',width:34,height:34,cursor:'pointer',fontSize:18}}>›</button>
              <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',display:'flex',gap:5}}>
                {imgs.map((_,i)=><div key={i} onClick={e=>{e.stopPropagation();setIdx(i);}} style={{width:6,height:6,borderRadius:'50%',background:i===idx?'white':'rgba(255,255,255,.35)',cursor:'pointer'}}/>)}
              </div>
              <div style={{position:'absolute',bottom:8,right:12,background:'rgba(0,0,0,.5)',color:'white',fontSize:11,padding:'2px 8px',borderRadius:10}}>{idx+1}/{imgs.length}</div>
            </>}
          </div>
          <div style={{padding:'22px 26px 26px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,marginBottom:18,flexWrap:'wrap'}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:C.muted,marginBottom:4}}>{car.brand}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700}}>{car.model} <span style={{fontWeight:400,opacity:.7}}>{car.year}</span></div>
              </div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:C.accent,flexShrink:0}}>{fmt(car.price)}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:1,background:C.border,borderRadius:10,overflow:'hidden',marginBottom:18}}>
              {[[fmtKm(car.km),'Chilometri'],[car.hp+' CV','Potenza'],[car.transmission,'Cambio'],[car.fuel,'Alimentazione'],[car.color,'Colore'],[car.doors+' porte','Carrozzeria']].map(([v,l])=>(
                <div key={l} style={{background:'#F5F4F0',padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:13,fontWeight:600}}>{v}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            {car.description&&<p style={{fontSize:14,lineHeight:1.75,color:'#666',marginBottom:14}}>{car.description}</p>}
            {car.features&&car.features.length>0&&(
              <div style={{marginBottom:20}}>{car.features.map(f=><span key={f} style={{display:'inline-block',padding:'3px 10px',background:'#F5F4F0',borderRadius:20,fontSize:11,margin:'2px',border:`1px solid ${C.border}`,fontWeight:500}}>{f}</span>)}</div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <a href={`tel:${A.tel1.replace(/\s/g,'')}`} style={{textDecoration:'none'}}>
                <button style={{width:'100%',padding:13,background:C.accent,color:'white',border:'none',borderRadius:8,fontSize:12,fontWeight:600,letterSpacing:'.07em',textTransform:'uppercase',cursor:'pointer'}}>📞 Chiama ora</button>
              </a>
              <a href={`mailto:${A.email}?subject=Info: ${car.brand} ${car.model} ${car.year}`} style={{textDecoration:'none'}}>
                <button style={{width:'100%',padding:13,background:'transparent',color:C.ink,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,fontWeight:600,letterSpacing:'.07em',textTransform:'uppercase',cursor:'pointer'}}>✉️ Scrivi</button>
              </a>
            </div>
            {car.as24url&&<div style={{marginTop:10,textAlign:'center'}}><a href={car.as24url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:C.muted,textDecoration:'underline'}}>Vedi su AutoScout24 ↗</a></div>}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Site/>);
</script>
</body>
</html>
