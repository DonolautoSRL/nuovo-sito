<head>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #F5F4F0; font-family: 'DM Sans', sans-serif; }
    select, input, textarea, button { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F5F4F0; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* ── COOKIE BANNER ── */
    #cookie-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: #1a1a1a; color: #e5e5e5;
      padding: 18px 28px; display: flex; align-items: center;
      justify-content: space-between; gap: 20; flex-wrap: wrap;
      border-top: 3px solid #CC1F1F; box-shadow: 0 -4px 20px rgba(0,0,0,.3);
    }
    #cookie-banner.hidden { display: none; }
    #cookie-banner p { font-size: 13px; line-height: 1.6; flex: 1; min-width: 240px; }
    #cookie-banner a { color: #e87070; text-decoration: underline; cursor: pointer; }
    .cookie-btns { display: flex; gap: 10px; flex-shrink: 0; }
    .btn-accept {
      background: #CC1F1F; color: white; border: none;
      padding: 9px 20px; border-radius: 7px; font-size: 13px;
      font-weight: 600; cursor: pointer; letter-spacing: .04em;
    }
    .btn-decline {
      background: transparent; color: #aaa;
      border: 1.5px solid #444; padding: 9px 20px;
      border-radius: 7px; font-size: 13px; cursor: pointer;
    }
    .btn-decline:hover { border-color: #888; color: #ccc; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      z-index: 500; display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }
    .modal-box {
      background: #fff; border-radius: 16px; max-width: 780px;
      width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,.45); color: white; border: none;
      border-radius: 50%; width: 34px; height: 34px;
      cursor: pointer; font-size: 16px; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── LEGAL MODAL ── */
    .legal-content { padding: 32px 36px 36px; }
    .legal-content h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .legal-content h2 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; margin: 24px 0 8px; color: #1a1a1a; }
    .legal-content p, .legal-content li { font-size: 14px; line-height: 1.8; color: #555; margin-bottom: 8px; }
    .legal-content ul { padding-left: 20px; }
    .legal-content .meta { font-size: 12px; color: #999; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee; }

    /* ── CARD HOVER ── */
    .car-card { transition: transform .2s ease, box-shadow .2s ease; }
    .car-card:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(0,0,0,.09); }
    .dark-card { transition: transform .2s ease; }
    .dark-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body>
<div id="root"></div>

<!-- ── COOKIE BANNER ── -->
<div id="cookie-banner">
  <p>
    Questo sito utilizza solo cookie tecnici strettamente necessari al funzionamento.
    Non utilizziamo cookie di profilazione o tracciamento di terze parti.
    Leggi la nostra <a onclick="showLegal('cookie')">Cookie Policy</a> e la
    <a onclick="showLegal('privacy')">Privacy Policy</a>.
  </p>
  <div class="cookie-btns">
    <button class="btn-decline" onclick="setCookieChoice(false)">Rifiuta facoltativi</button>
    <button class="btn-accept" onclick="setCookieChoice(true)">Accetta e chiudi</button>
  </div>
</div>

<script>
  // ── COOKIE GDPR LOGIC ──
  function setCookieChoice(accepted) {
    localStorage.setItem('dnl_cookie_choice', accepted ? 'accepted' : 'declined');
    localStorage.setItem('dnl_cookie_date', new Date().toISOString());
    document.getElementById('cookie-banner').classList.add('hidden');
  }
  function showLegal(type) {
    window._showLegal && window._showLegal(type);
  }
  (function(){
    const choice = localStorage.getItem('dnl_cookie_choice');
    const date   = localStorage.getItem('dnl_cookie_date');
    const expired = date ? (Date.now() - new Date(date).getTime()) > 365*24*60*60*1000 : true;
    if (choice && !expired) {
      document.getElementById('cookie-banner').classList.add('hidden');
    }
  })();
</script>

                  <div>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:3}}>{label}</div>
                    <div style={{fontSize:14,fontWeight:500}}>{value}</div>
                  </div>
                </div>
              ))}
            </div>
            <a href="tel:+390490000000" style={{display:"block",textDecoration:"none"}}>
              <button style={{marginTop:24,width:"100%",padding:14,background:C.accent,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer"}}>
                📞 Chiama ora
              </button>
            </a>
          </div>
        )}

        {/* ── FOOTER ── */}
        <footer style={{background:"#1a1a1a",color:"#666",padding:"24px 36px",marginTop:40,display:"flex",flexWrap:"wrap",gap:16,justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:12}}>
            © {new Date().getFullYear()} Donolauto S.r.l. · Via Romea 121, 35020 Legnaro (PD) · P.IVA: [inserire]
          </div>
          <div style={{display:"flex",gap:20,fontSize:12}}>
            <button onClick={()=>setLegalType('privacy')} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Privacy Policy</button>
            <button onClick={()=>setLegalType('cookie')}  style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Cookie Policy</button>
          </div>
        </footer>

        {/* ── MODAL AUTO ── */}
        {car && <CarModal car={car} onClose={()=>setCar(null)}/>}

        {/* ── LEGAL MODALS ── */}
        {legalType && <LegalModal type={legalType} onClose={()=>setLegalType(null)}/>}

      </div>
    );
  }

  // ── SELECT ──
  function Sel({value, onChange, label, disabled, children}) {
    return (
      <div style={{position:"relative",flex:1,minWidth:145}}>
        <select value={value} disabled={disabled} onChange={e=>onChange(e.target.value)}
          style={{width:"100%",padding:"10px 32px 10px 13px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:value?C.ink:C.muted,background:C.white,cursor:disabled?"not-allowed":"pointer",outline:"none",appearance:"none",WebkitAppearance:"none",opacity:disabled?0.5:1}}>
          <option value="">{label}</option>
          {children}
        </select>
        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:10,color:C.muted}}>▾</span>
      </div>
    );
  }

  // ── CARD STOCK ──
  function Card({car, onClick}) {
    return (
      <div onClick={onClick} className="car-card"
        style={{background:C.white,borderRadius:12,overflow:"hidden",cursor:"pointer",border:`1px solid ${C.border}`,boxShadow:"0 2px 6px rgba(0,0,0,.04)"}}>
        <div style={{width:"100%",aspectRatio:"16/10",background:car.gradient,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          <span style={{fontSize:50,opacity:.18}}>🚗</span>
          {car.special && (
            <div style={{position:"absolute",top:8,right:8,background:C.accent,color:"white",fontSize:9,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",padding:"3px 7px",borderRadius:4}}>
              ★ SPECIAL
            </div>
          )}
        </div>
        <div style={{padding:"13px 15px"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:3}}>{car.brand}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,marginBottom:7}}>{car.model}</div>
          <div style={{display:"flex",gap:8,fontSize:11,color:C.muted,marginBottom:9}}>
            <span>{car.year}</span><span>·</span><span>{fmtKm(car.km)}</span><span>·</span><span>{car.fuel}</span>
          </div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.accent}}>{fmt(car.price)}</div>
        </div>
      </div>
    );
  }

  // ── DARK CARD ──
  function DarkCard({car, onClick}) {
    return (
      <div onClick={onClick} className="dark-card" style={{borderRadius:12,overflow:"hidden",border:"1px solid #2a2a2a",cursor:"pointer"}}>
        <div style={{width:"100%",aspectRatio:"16/10",background:car.gradient,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:50,opacity:.22}}>🚗</span>
        </div>
        <div style={{padding:"13px 15px",background:"#1a1a1a"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#444",marginBottom:3}}>{car.brand}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,color:"white",marginBottom:7}}>{car.model}</div>
          <div style={{display:"flex",gap:8,fontSize:11,color:"#555",marginBottom:9}}>
            <span>{car.year}</span><span>·</span><span>{fmtKm(car.km)}</span>
          </div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.accent}}>{fmt(car.price)}</div>
        </div>
      </div>
    );
  }

  // ── MODAL DETTAGLIO AUTO ──
  function CarModal({car, onClose}) {
    return (
      <div className="modal-overlay" onClick={onClose} style={{zIndex:300}}>
        <div className="modal-box" onClick={e=>e.stopPropagation()}>
          <button className="modal-close" onClick={onClose}>✕</button>
          <div style={{width:"100%",aspectRatio:"16/9",background:car.gradient,borderRadius:"16px 16px 0 0",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:80,opacity:.18}}>🚗</span>
          </div>
          <div style={{padding:"24px 28px 28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:20,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:4}}>{car.brand}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700}}>
                  {car.model} <span style={{fontWeight:400,opacity:.7}}>{car.year}</span>
                </div>
              </div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:C.accent,flexShrink:0}}>
                {fmt(car.price)}
              </div>
            </div>

            {/* Specifiche */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:C.border,borderRadius:10,overflow:"hidden",marginBottom:20}}>
              {[
                [fmtKm(car.km),"Chilometri"],
                [car.hp+" CV","Potenza"],
                [car.transmission,"Cambio"],
                [car.fuel,"Alimentazione"],
                [car.color,"Colore"],
                [car.doors+" porte","Carrozzeria"],
              ].map(([v,l]) => (
                <div key={l} style={{background:C.bg,padding:"13px",textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:600}}>{v}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>

            <p style={{fontSize:14,lineHeight:1.75,color:"#666",marginBottom:16}}>{car.desc}</p>

            <div style={{marginBottom:22}}>
              {car.features.map(f => (
                <span key={f} style={{display:"inline-block",padding:"3px 10px",background:C.bg,borderRadius:20,fontSize:11,margin:"3px",border:`1px solid ${C.border}`,fontWeight:500}}>
                  {f}
                </span>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <a href="tel:+390490000000" style={{textDecoration:"none"}}>
                <button style={{width:"100%",padding:14,background:C.accent,color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer"}}>
                  📞 Chiama ora
                </button>
              </a>
              <a href={`mailto:info@donolauto.it?subject=Informazioni su ${car.brand} ${car.model}`} style={{textDecoration:"none"}}>
                <button style={{width:"100%",padding:14,background:"transparent",color:C.ink,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer"}}>
                  ✉️ Scrivi
                </button>
              </a>
            </div>

            {car.as24url &&
              <div style={{marginTop:14,textAlign:"center"}}>
                <a href={car.as24url} target="_blank" rel="noopener noreferrer"
                  style={{fontSize:12,color:C.muted,textDecoration:"underline"}}>
                  Vedi annuncio su AutoScout24
                </a>
              </div>
            }
          </div>
        </div>
      </div>
    );
  }

  // ── AVVIO ──
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<Site/>);
</script>
</body>
</html>
