<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Donolauto — Concessionaria auto usate multi-brand a Legnaro (PD). Stock sempre aggiornato, Special Cars, garanzia e trasparenza."/>
  <title>Donolauto — Auto Usate Legnaro (PD)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #F5F4F0; font-family: 'DM Sans', sans-serif; }
    select, input, textarea, button { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F5F4F0; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    #cookie-banner { position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1a1a1a;color:#e5e5e5;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;border-top:3px solid #CC1F1F;box-shadow:0 -4px 20px rgba(0,0,0,.3); }
    #cookie-banner.hidden { display:none; }
    #cookie-banner p { font-size:13px;line-height:1.6;flex:1;min-width:240px; }
    #cookie-banner a { color:#e87070;text-decoration:underline;cursor:pointer; }
    .cookie-btns { display:flex;gap:10px;flex-shrink:0; }
    .btn-accept { background:#CC1F1F;color:white;border:none;padding:9px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer; }
    .btn-decline { background:transparent;color:#aaa;border:1.5px solid #444;padding:9px 20px;border-radius:7px;font-size:13px;cursor:pointer; }
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px; }
    .modal-box { background:#fff;border-radius:16px;max-width:780px;width:100%;max-height:90vh;overflow-y:auto;position:relative; }
    .modal-close { position:absolute;top:12px;right:12px;background:rgba(0,0,0,.45);color:white;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;z-index:10;display:flex;align-items:center;justify-content:center; }
    .legal-content { padding:32px 36px 36px; }
    .legal-content h1 { font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:6px; }
    .legal-content h2 { font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin:24px 0 8px; }
    .legal-content p, .legal-content li { font-size:14px;line-height:1.8;color:#555;margin-bottom:8px; }
    .legal-content ul { padding-left:20px; }
    .legal-content .meta { font-size:12px;color:#999;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #eee; }
    .car-card { transition:transform .2s ease,box-shadow .2s ease; }
    .car-card:hover { transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.09); }
    .dark-card { transition:transform .2s ease; }
    .dark-card:hover { transform:translateY(-4px); }
  </style>
</head>
<body>
<div id="root"></div>

<div id="cookie-banner">
  <p>Questo sito utilizza solo cookie tecnici strettamente necessari al funzionamento. Non utilizziamo cookie di profilazione o tracciamento di terze parti. Leggi la nostra <a onclick="showLegal('cookie')">Cookie Policy</a> e la <a onclick="showLegal('privacy')">Privacy Policy</a>.</p>
  <div class="cookie-btns">
    <button class="btn-decline" onclick="setCookieChoice(false)">Rifiuta facoltativi</button>
    <button class="btn-accept" onclick="setCookieChoice(true)">Accetta e chiudi</button>
  </div>
</div>

<script>
  function setCookieChoice(a){localStorage.setItem('dnl_cookie_choice',a?'accepted':'declined');localStorage.setItem('dnl_cookie_date',new Date().toISOString());document.getElementById('cookie-banner').classList.add('hidden');}
  function showLegal(t){window._showLegal&&window._showLegal(t);}
  (function(){const c=localStorage.getItem('dnl_cookie_choice'),d=localStorage.getItem('dnl_cookie_date'),e=d?(Date.now()-new Date(d).getTime())>365*24*60*60*1000:true;if(c&&!e)document.getElementById('cookie-banner').classList.add('hidden');})();
</script>

<script type="text/babel">
  const { useState, useEffect } = React;
  const C = { bg:'#F5F4F0',white:'#FFFFFF',ink:'#1A1A1A',muted:'#888',accent:'#CC1F1F',border:'#E2E0DA',dark:'#111111' };

  const AZIENDA = {
    nome: "Donolauto S.r.l.",
    indirizzo: "Via Romea 121, 35020 Legnaro (PD)",
    piva: "IT 05258940286",
    pec: "donolautosrl@pec.it",
    email: "info@donolauto.it",
    tel1: "+39 351 8707610",
    tel2: "+39 049 641284",
    orari: "Lun–Ven 9:00–12:30 · 14:30–19:00 · Sab 9:00–12:30",
  };

  // ── STOCK AUTO — viene sovrascritto dall'admin se presente ──
  const CARS_DEFAULT = [
    { id:1,brand:"BMW",model:"Serie 3 320d",year:2021,fuel:"Diesel",price:29900,km:38000,hp:190,color:"Bianco Alpino",transmission:"Automatico",doors:4,special:true,gradient:"linear-gradient(135deg,#ddd,#f5f5f5)",desc:"Perfetta condizione, tagliando BMW effettuato, sedili riscaldati, navigatore professionale. Un solo proprietario.",features:["Virtual Cockpit","Sedili riscaldati","Navigatore Pro","Cerchi 18\"","Camera posteriore"] },
    { id:2,brand:"Volkswagen",model:"Golf 1.5 TSI",year:2022,fuel:"Benzina",price:22500,km:21000,hp:130,color:"Grigio Urano",transmission:"Manuale",doors:5,special:false,gradient:"linear-gradient(135deg,#999,#ccc)",desc:"Prima immatricolazione italiana, un solo proprietario, garanzia attiva.",features:["App-Connect","Lane Assist","Frenata automatica","LED"] },
    { id:3,brand:"Audi",model:"A4 2.0 TDI",year:2020,fuel:"Diesel",price:26800,km:55000,hp:150,color:"Nero Mythos",transmission:"Automatico",doors:4,special:true,gradient:"linear-gradient(135deg,#1a1a1a,#444)",desc:"Full optional. Pelle, Virtual Cockpit, Matrix LED.",features:["Virtual Cockpit","Pelle nappa","Matrix LED","Cerchi 19\"","B&O Sound"] },
    { id:4,brand:"Toyota",model:"Yaris Cross",year:2023,fuel:"Ibrido",price:19900,km:8000,hp:116,color:"Rosso",transmission:"Automatico",doors:5,special:false,gradient:"linear-gradient(135deg,#900,#c33)",desc:"Quasi nuova. Garanzia Toyota attiva, consumi bassissimi.",features:["Full Hybrid","Toyota Safety Sense","Camera 360°","Navi 9\""] },
    { id:5,brand:"Mercedes",model:"Classe A 180d",year:2021,fuel:"Diesel",price:24500,km:32000,hp:116,color:"Blu Cavansite",transmission:"Automatico",doors:5,special:false,gradient:"linear-gradient(135deg,#0a2a5e,#1a4a8e)",desc:"MBUX dual-screen, sedili comfort, parking assist.",features:["MBUX","Parking Assist","LED","Cerchi 17\""] },
    { id:6,brand:"Porsche",model:"Cayenne 3.0 V6",year:2019,fuel:"Benzina",price:58900,km:68000,hp:340,color:"Grigio Platino",transmission:"Automatico",doors:5,special:true,gradient:"linear-gradient(135deg,#3a3a3a,#777)",desc:"BOSE, tetto panoramico, Sport Chrono.",features:["Sport Chrono","BOSE","Tetto panoramico","Aria sospesa","Pelle bi-colore"] },
    { id:7,brand:"Alfa Romeo",model:"Giulia 2.0 T",year:2020,fuel:"Benzina",price:31500,km:44000,hp:200,color:"Rosso Alfa",transmission:"Automatico",doors:4,special:true,gradient:"linear-gradient(135deg,#7a0000,#bb0000)",desc:"DNA del motorsport italiano. Distribuzione 50/50.",features:["DNA selector","Sedili Sparco","Harman Kardon","LED","Cerchi 18\""] },
  ];

  function loadCars(){try{const s=localStorage.getItem('dnl_cars_published');return s?JSON.parse(s):CARS_DEFAULT;}catch{return CARS_DEFAULT;}}

  const fmt   = p => "€ " + parseInt(p).toLocaleString("it-IT");
  const fmtKm = k => parseInt(k).toLocaleString("it-IT") + " km";
  const BRANDS = () => [...new Set(loadCars().map(c=>c.brand))].sort();
  const FUELS  = () => [...new Set(loadCars().map(c=>c.fuel))].sort();

  const PRIVACY = { title:"Privacy Policy", updated:"Aggiornata il 18 aprile 2025", sections:[
    {h:"1. Titolare del Trattamento",p:`${AZIENDA.nome} · ${AZIENDA.indirizzo} · P.IVA: ${AZIENDA.piva} · PEC: ${AZIENDA.pec} · Email: ${AZIENDA.email}`},
    {h:"2. Dati raccolti",p:"Il sito raccoglie esclusivamente i dati che l'utente fornisce volontariamente tramite il modulo di contatto (nome, indirizzo e-mail, numero di telefono e testo del messaggio). Non raccogliamo dati di navigazione, non utilizziamo cookie di profilazione né sistemi di tracciamento."},
    {h:"3. Finalità del trattamento",p:"I dati forniti tramite il modulo di contatto vengono utilizzati esclusivamente per rispondere alle richieste dell'utente e non vengono ceduti a terzi."},
    {h:"4. Base giuridica",p:"Il trattamento è fondato sull'esecuzione di misure precontrattuali (art. 6, par. 1, lett. b GDPR) e/o sul consenso dell'interessato (art. 6, par. 1, lett. a GDPR)."},
    {h:"5. Conservazione",p:"I dati raccolti tramite contatto vengono conservati per il tempo strettamente necessario a gestire la richiesta e non oltre 12 mesi dalla ricezione."},
    {h:"6. Diritti dell'interessato",p:`Hai diritto di accedere, rettificare, cancellare i tuoi dati e opporti al trattamento. Scrivici a: ${AZIENDA.email}`},
    {h:"7. Reclamo",p:"Puoi proporre reclamo al Garante per la protezione dei dati personali (www.garanteprivacy.it)."},
  ]};

  const COOKIE = { title:"Cookie Policy", updated:"Aggiornata il 18 aprile 2025", sections:[
    {h:"Cosa sono i cookie",p:"I cookie sono piccoli file di testo salvati nel browser durante la navigazione."},
    {h:"Cookie tecnici utilizzati",list:["dnl_cookie_choice — memorizza la tua scelta sul consenso (durata: 12 mesi)","dnl_cookie_date — memorizza la data del consenso (durata: 12 mesi)","dnl_cars_published — memorizza lo stock auto pubblicato dall'admin (locale, nessuna trasmissione)"]},
    {h:"Cookie di terze parti",p:"Questo sito non utilizza cookie di profilazione, tracciamento o analytics di terze parti."},
    {h:"Google Fonts",p:"Il sito carica font da Google Fonts. Questo può comportare la trasmissione dell'IP al server Google. Vedi: policies.google.com/privacy"},
    {h:"Disabilitare i cookie",p:"Puoi disabilitare i cookie dalle impostazioni del tuo browser. La disabilitazione dei cookie tecnici potrebbe compromettere il funzionamento del sito."},
  ]};

  function LegalModal({type, onClose}){
    const doc = type==='privacy' ? PRIVACY : COOKIE;
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-box" onClick={e=>e.stopPropagation()}>
          <button className="modal-close" onClick={onClose}>✕</button>
          <div className="legal-content">
            <h1>{doc.title}</h1>
            <div className="meta">{AZIENDA.nome} · {doc.updated}</div>
            {doc.sections.map((s,i)=>(
              <div key={i}>
                {s.h&&<h2>{s.h}</h2>}
                {s.p&&<p>{s.p}</p>}
                {s.list&&<ul>{s.list.map((l,j)=><li key={j}>{l}</li>)}</ul>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  function Site(){
    const [page,setPage]=useState("stock");
    const [filters,setFilters]=useState({brand:"",model:"",fuel:"",priceMax:""});
    const [car,setCar]=useState(null);
    const [legalType,setLegalType]=useState(null);
    const [cars,setCars]=useState(loadCars());

    useEffect(()=>{
      window._showLegal=(t)=>setLegalType(t);
      const onStorage=()=>setCars(loadCars());
      window.addEventListener('storage',onStorage);
      return ()=>window.removeEventListener('storage',onStorage);
    },[]);

    const brands=[...new Set(cars.map(c=>c.brand))].sort();
    const fuels=[...new Set(cars.map(c=>c.fuel))].sort();
    const models=filters.brand?[...new Set(cars.filter(c=>c.brand===filters.brand).map(c=>c.model))]:[];
    const filtered=cars.filter(c=>{
      if(filters.brand&&c.brand!==filters.brand)return false;
      if(filters.model&&c.model!==filters.model)return false;
      if(filters.fuel&&c.fuel!==filters.fuel)return false;
      if(filters.priceMax&&c.price>parseInt(filters.priceMax))return false;
      return true;
    });

    const NAV=[["stock","Stock Auto"],["special","Special Cars"],["storia","Chi Siamo"],["contatti","Contatti"]];

    return (
      <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,minHeight:"100vh",color:C.ink}}>

        <header style={{background:C.white,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 36px",height:62}}>
          <div onClick={()=>setPage("stock")} style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,letterSpacing:"0.04em",cursor:"pointer",userSelect:"none"}}>
            DONO<span style={{color:C.accent}}>LAUTO</span>
            <span style={{fontSize:11,fontWeight:400,color:C.muted,marginLeft:10,letterSpacing:"0.06em"}}>LEGNARO · PD</span>
          </div>
          <nav style={{display:"flex",gap:28}}>
            {NAV.map(([id,label])=>(
              <button key={id} onClick={()=>setPage(id)} style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",background:"none",border:"none",color:page===id?C.ink:C.muted,borderBottom:page===id?`2px solid ${C.accent}`:"2px solid transparent",paddingBottom:3,cursor:"pointer"}}>
                {label}
              </button>
            ))}
          </nav>
        </header>

        {page==="stock"&&<>
          <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"26px 36px"}}>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:400,margin:"0 0 18px"}}>Trova la tua prossima auto</h1>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
              <Sel value={filters.brand} onChange={v=>setFilters({...filters,brand:v,model:""})} label="Marca">{brands.map(b=><option key={b} value={b}>{b}</option>)}</Sel>
              <Sel value={filters.model} onChange={v=>setFilters({...filters,model:v})} label="Modello" disabled={!filters.brand}>{models.map(m=><option key={m} value={m}>{m}</option>)}</Sel>
              <Sel value={filters.fuel} onChange={v=>setFilters({...filters,fuel:v})} label="Alimentazione">{fuels.map(f=><option key={f} value={f}>{f}</option>)}</Sel>
              <Sel value={filters.priceMax} onChange={v=>setFilters({...filters,priceMax:v})} label="Prezzo max">
                {[["15000","fino a € 15.000"],["20000","fino a € 20.000"],["25000","fino a € 25.000"],["30000","fino a € 30.000"],["40000","fino a € 40.000"],["60000","fino a € 60.000"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </Sel>
              <button onClick={()=>setFilters({brand:"",model:"",fuel:"",priceMax:""})} style={{padding:"10px 16px",background:"transparent",color:C.muted,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>✕ Reset</button>
            </div>
          </div>
          <div style={{padding:"26px 36px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:400,margin:0}}>Stock disponibile</h2>
              <span style={{fontSize:12,color:C.muted,fontWeight:500}}>{filtered.length} auto trovate</span>
            </div>
            {filtered.length===0
              ?<div style={{textAlign:"center",padding:"60px 0",color:C.muted,fontSize:15}}>Nessun veicolo corrisponde ai filtri selezionati.</div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16}}>{filtered.map(c=><Card key={c.id} car={c} onClick={()=>setCar(c)}/>)}</div>
            }
          </div>
        </>}

        {page==="special"&&(
          <div style={{background:C.dark,minHeight:"calc(100vh - 62px)",padding:"50px 36px"}}>
            <div style={{maxWidth:1100,margin:"0 auto"}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"#444",marginBottom:8}}>SELEZIONE ESCLUSIVA</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:400,color:"white",margin:"0 0 36px"}}>Special Cars</h2>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
                {cars.filter(c=>c.special).map(c=><DarkCard key={c.id} car={c} onClick={()=>setCar(c)}/>)}
              </div>
              {cars.filter(c=>c.special).length===0&&<div style={{color:"#444",fontSize:15,textAlign:"center",padding:"60px 0"}}>Nessuna Special Car al momento.</div>}
            </div>
          </div>
        )}

        {page==="storia"&&(
          <div style={{padding:"70px 36px"}}>
            <div style={{maxWidth:660,margin:"0 auto",textAlign:"center"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:96,fontWeight:700,color:C.accent,opacity:0.1,lineHeight:1,userSelect:"none"}}>1975</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:400,margin:"-18px 0 22px"}}>Oltre 50 anni di passione per l'auto</h2>
              {["Donolauto nasce a Legnaro nel cuore della provincia di Padova. Da oltre mezzo secolo la famiglia affianca i clienti nella scelta dell'auto giusta: un consulente di fiducia, non un semplice venditore.","Ogni auto nel nostro stock passa dalla nostra officina interna: viene preparata, revisionata e certificata prima di essere proposta. Nessuna sorpresa, solo trasparenza.","Con oltre 120 vetture vendute ogni anno e una rete di clienti fidelizzati nell'area Padova–Venezia, Donolauto è sinonimo di qualità e serietà nel mercato dell'usato multi-brand."].map((t,i)=><p key={i} style={{fontSize:15,lineHeight:1.85,color:"#666",margin:"0 0 16px"}}>{t}</p>)}
              <div style={{display:"flex",justifyContent:"center",gap:48,marginTop:48}}>
                {[["50+","Anni di attività"],["120+","Auto / anno"],["1","Officina interna"]].map(([n,l])=>(
                  <div key={l}><div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,color:C.accent}}>{n}</div><div style={{fontSize:11,color:C.muted,marginTop:4}}>{l}</div></div>
                ))}
              </div>
            </div>
          </div>
        )}

        {page==="contatti"&&(
          <div style={{padding:"56px 36px",maxWidth:540,margin:"0 auto"}}>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:400,margin:"0 0 6px"}}>Contattaci</h2>
            <p style={{color:C.muted,fontSize:14,margin:"0 0 28px"}}>Siamo a Legnaro (PD). Vieni a trovarci o scrivici.</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[["📍","Indirizzo",AZIENDA.indirizzo],["📞","Cellulare",AZIENDA.tel1],["📞","Fisso",AZIENDA.tel2],["✉️","Email",AZIENDA.email],["📧","PEC",AZIENDA.pec],["🕐","Orari",AZIENDA.orari]].map(([icon,label,value])=>(
                <div key={label} style={{display:"flex",gap:14,padding:"14px 16px",background:C.white,borderRadius:10,border:`1px solid ${C.border}`,alignItems:"center"}}>
                  <span style={{fontSize:20}}>{icon}</span>
                  <div><div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,marginBottom:3}}>{label}</div><div style={{fontSize:14,fontWeight:500}}>{value}</div></div>
                </div>
              ))}
            </div>
            <a href={`tel:${AZIENDA.tel1.replace(/\s/g,'')}`} style={{display:"block",textDecoration:"none"}}>
              <button style={{marginTop:20,width:"100%",padding:14,background:C.accent,color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer"}}>📞 Chiama ora</button>
            </a>
          </div>
        )}

        <footer style={{background:"#1a1a1a",color:"#555",padding:"22px 36px",marginTop:40,display:"flex",flexWrap:"wrap",gap:14,justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,lineHeight:1.8}}>
            © {new Date().getFullYear()} {AZIENDA.nome} · {AZIENDA.indirizzo} · P.IVA: {AZIENDA.piva}<br/>
            Tel: {AZIENDA.tel1} / {AZIENDA.tel2} · PEC: {AZIENDA.pec}
          </div>
          <div style={{display:"flex",gap:18,fontSize:12}}>
            <button onClick={()=>setLegalType('privacy')} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Privacy Policy</button>
            <button onClick={()=>setLegalType('cookie')}  style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Cookie Policy</button>
          </div>
        </footer>

        {car&&<CarModal car={car} onClose={()=>setCar(null)}/>}
        {legalType&&<LegalModal type={legalType} onClose={()=>setLegalType(null)}/>}
      </div>
    );
  }

  function Sel({value,onChange,label,disabled,children}){
    return(
      <div style={{position:"relative",flex:1,minWidth:145}}>
        <select value={value} disabled={disabled} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"10px 32px 10px 13px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:value?C.ink:C.muted,background:C.white,cursor:disabled?"not-allowed":"pointer",outline:"none",appearance:"none",WebkitAppearance:"none",opacity:disabled?0.5:1}}>
          <option value="">{label}</option>{children}
        </select>
        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:10,color:C.muted}}>▾</span>
      </div>
    );
  }

  function Card({car,onClick}){
    return(
      <div onClick={onClick} className="car-card" style={{background:C.white,borderRadius:12,overflow:"hidden",cursor:"pointer",border:`1px solid ${C.border}`,boxShadow:"0 2px 6px rgba(0,0,0,.04)"}}>
        <div style={{width:"100%",aspectRatio:"16/10",background:car.gradient||"linear-gradient(135deg,#ccc,#eee)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          {car.images&&car.images[0]?<img src={car.images[0]} alt={car.model} style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>:<span style={{fontSize:50,opacity:.18}}>🚗</span>}
          {car.special&&<div style={{position:"absolute",top:8,right:8,background:C.accent,color:"white",fontSize:9,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",padding:"3px 7px",borderRadius:4}}>★ SPECIAL</div>}
        </div>
        <div style={{padding:"13px 15px"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:3}}>{car.brand}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,marginBottom:7}}>{car.model}</div>
          <div style={{display:"flex",gap:8,fontSize:11,color:C.muted,marginBottom:9}}><span>{car.year}</span><span>·</span><span>{fmtKm(car.km)}</span><span>·</span><span>{car.fuel}</span></div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.accent}}>{fmt(car.price)}</div>
        </div>
      </div>
    );
  }

  function DarkCard({car,onClick}){
    return(
      <div onClick={onClick} className="dark-card" style={{borderRadius:12,overflow:"hidden",border:"1px solid #2a2a2a",cursor:"pointer"}}>
        <div style={{width:"100%",aspectRatio:"16/10",background:car.gradient||"linear-gradient(135deg,#333,#555)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          {car.images&&car.images[0]?<img src={car.images[0]} alt={car.model} style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>:<span style={{fontSize:50,opacity:.22}}>🚗</span>}
        </div>
        <div style={{padding:"13px 15px",background:"#1a1a1a"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#444",marginBottom:3}}>{car.brand}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,color:"white",marginBottom:7}}>{car.model}</div>
          <div style={{display:"flex",gap:8,fontSize:11,color:"#555",marginBottom:9}}><span>{car.year}</span><span>·</span><span>{fmtKm(car.km)}</span></div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.accent}}>{fmt(car.price)}</div>
        </div>
      </div>
    );
  }

  function CarModal({car,onClose}){
    const [imgIdx,setImgIdx]=useState(0);
    const imgs=car.images&&car.images.length>0?car.images:null;
    return(
      <div className="modal-overlay" onClick={onClose} style={{zIndex:300}}>
        <div className="modal-box" onClick={e=>e.stopPropagation()}>
          <button className="modal-close" onClick={onClose}>✕</button>
          <div style={{width:"100%",aspectRatio:"16/9",background:car.gradient||"linear-gradient(135deg,#ccc,#eee)",borderRadius:"16px 16px 0 0",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
            {imgs?<img src={imgs[imgIdx]} alt={car.model} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:80,opacity:.18}}>🚗</span>}
            {imgs&&imgs.length>1&&<>
              <button onClick={e=>{e.stopPropagation();setImgIdx((imgIdx-1+imgs.length)%imgs.length);}} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,.5)",color:"white",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:18}}>‹</button>
              <button onClick={e=>{e.stopPropagation();setImgIdx((imgIdx+1)%imgs.length);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,.5)",color:"white",border:"none",borderRadius:"50%",width:34,height:34,cursor:"pointer",fontSize:18}}>›</button>
              <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5}}>
                {imgs.map((_,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i===imgIdx?"white":"rgba(255,255,255,.4)"}}/>)}
              </div>
            </>}
          </div>
          <div style={{padding:"24px 28px 28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:20,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,marginBottom:4}}>{car.brand}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700}}>{car.model} <span style={{fontWeight:400,opacity:.7}}>{car.year}</span></div>
              </div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:C.accent,flexShrink:0}}>{fmt(car.price)}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:C.border,borderRadius:10,overflow:"hidden",marginBottom:20}}>
              {[[fmtKm(car.km),"Chilometri"],[car.hp+" CV","Potenza"],[car.transmission,"Cambio"],[car.fuel,"Alimentazione"],[car.color,"Colore"],[car.doors+" porte","Carrozzeria"]].map(([v,l])=>(
                <div key={l} style={{background:"#F5F4F0",padding:"13px",textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:600}}>{v}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:3}}>{l}</div>
                </div>
              ))}
            </div>
            {car.desc&&<p style={{fontSize:14,lineHeight:1.75,color:"#666",marginBottom:16}}>{car.desc}</p>}
            {car.features&&car.features.length>0&&(
              <div style={{marginBottom:22}}>{car.features.map(f=><span key={f} style={{display:"inline-block",padding:"3px 10px",background:"#F5F4F0",borderRadius:20,fontSize:11,margin:"3px",border:`1px solid ${C.border}`,fontWeight:500}}>{f}</span>)}</div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <a href={`tel:${AZIENDA.tel1.replace(/\s/g,'')}`} style={{textDecoration:"none"}}>
                <button style={{width:"100%",padding:14,background:C.accent,color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer"}}>📞 Chiama ora</button>
              </a>
              <a href={`mailto:${AZIENDA.email}?subject=Info: ${car.brand} ${car.model} ${car.year}`} style={{textDecoration:"none"}}>
                <button style={{width:"100%",padding:14,background:"transparent",color:C.ink,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",cursor:"pointer"}}>✉️ Scrivi</button>
              </a>
            </div>
            {car.as24url&&<div style={{marginTop:12,textAlign:"center"}}><a href={car.as24url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:C.muted,textDecoration:"underline"}}>Vedi su AutoScout24</a></div>}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Site/>);
</script>
</body>
</html>
